<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conditionals Quest</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-bottom:20px;
color:#38bdf8;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

.tab.active{
background:#38bdf8;
color:black;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
width:100%;
max-width:700px;
margin-bottom:20px;
}

.card h2{
margin-bottom:10px;
color:#38bdf8;
}

.formula{
margin-top:10px;
padding:10px;
background:#334155;
border-radius:8px;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.options{
display:grid;
gap:10px;
}

.option{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#334155;
color:white;
font-size:16px;
}

.option:hover{
background:#475569;
}

.correct{
background:#16a34a !important;
}

.wrong{
background:#dc2626 !important;
}

#feedback{
margin-top:15px;
font-weight:bold;
}

.score{
margin-bottom:15px;
font-size:18px;
}

.nextBtn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
display:none;
}

.result{
display:none;
text-align:center;
}

.result h2{
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🎯 Conditionals Quest</h1>

<div class="tabs">
<button class="tab active" onclick="changeLevel(0)">Zero</button>
<button class="tab" onclick="changeLevel(1)">First</button>
<button class="tab" onclick="changeLevel(2)">Second</button>
<button class="tab" onclick="changeLevel(3)">Third</button>
</div>

<div class="card" id="theory"></div>

<div class="card">
<div class="score">Score: <span id="score">0</span></div>

<div id="quiz">

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div id="feedback"></div>

<button class="nextBtn" id="nextBtn" onclick="nextQuestion()">
Next Question →
</button>

</div>

<div class="result" id="result">
<h2>Quiz Finished 🎉</h2>
<p id="finalScore"></p>
</div>

</div>

<script>

const theoryData = [
{
title:"Zero Conditional",
desc:"General truths and facts.",
formula:"If + Present Simple → Present Simple"
},
{
title:"First Conditional",
desc:"Real future possibilities.",
formula:"If + Present Simple → Will + Verb"
},
{
title:"Second Conditional",
desc:"Imaginary situations.",
formula:"If + Past Simple → Would + Verb"
},
{
title:"Third Conditional",
desc:"Past hypothetical situations.",
formula:"If + Past Perfect → Would Have + Past Participle"
}
];

const questions = {

0:[
{
q:"If you heat water to 100°C, it ___",
options:["boils","will boil","would boil","boiled"],
answer:0
},
{
q:"If people don't sleep, they ___ tired.",
options:["feel","will feel","felt","would feel"],
answer:0
}
],

1:[
{
q:"If it rains tomorrow, I ___ home.",
options:["stay","will stay","stayed","would stay"],
answer:1
},
{
q:"If she studies, she ___ the exam.",
options:["passes","will pass","passed","would pass"],
answer:1
}
],

2:[
{
q:"If I were rich, I ___ a Ferrari.",
options:["buy","will buy","would buy","bought"],
answer:2
},
{
q:"If I were you, I ___ harder.",
options:["study","would study","will study","studied"],
answer:1
}
],

3:[
{
q:"If she had studied, she ___ the test.",
options:[
"would pass",
"would have passed",
"passed",
"will pass"
],
answer:1
},
{
q:"If they had left earlier, they ___ late.",
options:[
"wouldn't have been",
"weren't",
"won't be",
"aren't"
],
answer:0
}
]

};

let level = 0;
let currentQuestion = 0;
let score = 0;

function loadTheory(){

document.getElementById("theory").innerHTML=
`
<h2>${theoryData[level].title}</h2>
<p>${theoryData[level].desc}</p>
<div class="formula">
${theoryData[level].formula}
</div>
`;

}

function loadQuestion(){

const q = questions[level][currentQuestion];

document.getElementById("question").textContent=q.q;

const optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

document.getElementById("feedback").textContent="";
document.getElementById("nextBtn").style.display="none";

q.options.forEach((option,index)=>{

const btn=document.createElement("button");

btn.className="option";
btn.textContent=option;

btn.onclick=()=>checkAnswer(index);

optionsDiv.appendChild(btn);

});

}

function checkAnswer(index){

const q=questions[level][currentQuestion];

const buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>btn.disabled=true);

buttons[q.answer].classList.add("correct");

if(index===q.answer){

score++;
document.getElementById("score").textContent=score;

document.getElementById("feedback").textContent=
"✅ Correct!";

}else{

buttons[index].classList.add("wrong");

document.getElementById("feedback").textContent=
"❌ Wrong answer.";

}

document.getElementById("nextBtn").style.display=
"block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions[level].length){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("finalScore").textContent=
`You scored ${score}/${questions[level].length}`;

return;

}

loadQuestion();

}

function changeLevel(newLevel){

level=newLevel;

currentQuestion=0;
score=0;

document.getElementById("score").textContent=0;

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

document.querySelectorAll(".tab")[newLevel]
.classList.add("active");

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

loadTheory();
loadQuestion();

}

loadTheory();
loadQuestion();

</script>

</body>
</html>
